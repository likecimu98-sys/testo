<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff06a">
  <title>Тренажёр дат ЕГЭ</title>
  <style>
    :root{
      --bg:#fff7d6;
      --paper:#fffdf2;
      --ink:#141414;
      --muted:#57534e;
      --line:#141414;
      --yellow:#fff06a;
      --pink:#ff7cc8;
      --blue:#75d7ff;
      --green:#7dff97;
      --red:#ff6b5f;
      --orange:#ffb84d;
      --shadow:5px 5px 0 var(--ink);
      --shadow-sm:3px 3px 0 var(--ink);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{margin:0;background:radial-gradient(circle at 10% 0%,#ffed9a 0 130px,transparent 131px),radial-gradient(circle at 95% 8%,#ffc7eb 0 110px,transparent 111px),linear-gradient(180deg,var(--bg),#f5f0ff));color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35;min-height:100vh}
    button,input{font:inherit;color:inherit}
    button{touch-action:manipulation}
    .wrap{max-width:920px;margin:0 auto;padding:14px 12px 96px}
    .hero{display:grid;gap:12px;margin:4px 0 14px}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    h1{font-size:clamp(30px,8vw,58px);line-height:.94;margin:0;font-weight:1000;letter-spacing:-.055em;text-transform:uppercase}
    .subtitle{font-size:15px;font-weight:750;color:var(--muted);max-width:620px}
    .counter{border:3px solid var(--line);border-radius:999px;background:var(--yellow);box-shadow:var(--shadow-sm);padding:10px 13px;font-weight:1000;white-space:nowrap;cursor:pointer;transform:rotate(2deg)}
    .counter:active,.btn:active,.deck:active,.option:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
    .panel,.deck,.question-card,.modal-card{background:var(--paper);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel{padding:14px}
    .rules{display:grid;gap:7px;font-size:14px;font-weight:800}
    .rules b{background:var(--yellow);border:2px solid var(--line);border-radius:9px;padding:1px 5px;box-shadow:2px 2px 0 var(--ink)}
    .decks{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    .deck{width:100%;text-align:left;padding:14px;cursor:pointer;background:#fff;border-radius:22px;display:grid;gap:10px;position:relative;overflow:hidden}
    .deck::after{content:"";position:absolute;right:-28px;top:-28px;width:84px;height:84px;background:var(--blue);border:3px solid var(--line);border-radius:999px;z-index:0}
    .deck.done{background:#eaffdf}
    .deck.done::after{background:var(--green)}
    .deck.vov::after{background:var(--pink)}
    .deck.commander::after{background:var(--orange)}
    .deck.film::after{background:var(--blue)}
    .compact-hero{margin-bottom:10px}
    .compact-hero .hero-top{align-items:center}
    .deck>*{position:relative;z-index:1}
    .deck-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:21px;font-weight:1000;letter-spacing:-.02em}
    .tag{display:inline-flex;align-items:center;justify-content:center;border:2px solid var(--line);border-radius:999px;background:#fff;padding:5px 8px;font-size:12px;font-weight:1000;white-space:nowrap;box-shadow:2px 2px 0 var(--ink)}
    .tag.green{background:var(--green)} .tag.yellow{background:var(--yellow)} .tag.pink{background:var(--pink)} .tag.blue{background:var(--blue)} .tag.red{background:var(--red)}
    .deck-meta{font-size:13px;color:var(--muted);font-weight:800}
    .progress{height:14px;background:#fff;border:3px solid var(--line);border-radius:999px;overflow:hidden}
    .fill{display:block;height:100%;width:0%;background:var(--pink);border-right:3px solid var(--line);transition:width .25s ease}
    .deck.done .fill{background:var(--green)}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(255,247,214,.88);backdrop-filter:blur(10px);padding:10px 0 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .btn{border:3px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);padding:12px 14px;font-weight:1000;cursor:pointer;min-height:48px}
    .btn.primary{background:var(--yellow)} .btn.blue{background:var(--blue)} .btn.pink{background:var(--pink)} .btn.green{background:var(--green)}
    .btn:disabled{opacity:.55;cursor:not-allowed;filter:grayscale(.2)}
    .status-row{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 10px}
    .question-card{padding:16px;display:grid;gap:14px;background:#fff}
    .label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:1000;color:var(--muted)}
    .question{font-size:clamp(21px,5.8vw,32px);line-height:1.14;font-weight:1000;letter-spacing:-.025em}
    .options{display:grid;gap:10px}
    .option{width:100%;text-align:left;border:3px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow-sm);padding:14px 13px;font-size:17px;font-weight:1000;cursor:pointer;min-height:58px}
    .option.selected{background:var(--blue)}
    .option.correct{background:var(--green)}
    .option.wrong{background:var(--red)}
    .answer-input{width:100%;border:3px solid var(--line);border-radius:18px;background:#fff;box-shadow:var(--shadow-sm);padding:16px 14px;font-size:20px;font-weight:900;outline:none}
    .answer-input:focus{background:#fffef0;box-shadow:var(--shadow)}
    .feedback{display:none;border:3px solid var(--line);border-radius:18px;padding:12px;font-weight:900;background:#fff}
    .feedback.show{display:block}
    .feedback.ok{background:var(--green)} .feedback.no{background:#ffe1df} .feedback.info{background:var(--blue)} .feedback.wait{background:#fff0ab}
    .right-answer{font-size:20px;font-weight:1000;margin-top:6px}
    .bottom-actions{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,247,214,.92);backdrop-filter:blur(12px);border-top:3px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
    .bottom-inner{max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:10px}.bottom-inner .btn{width:100%}
    .complete{text-align:center;padding:26px 16px;display:grid;gap:14px}
    .complete .emoji{font-size:52px}
    .complete h2{font-size:34px;margin:0;letter-spacing:-.04em}
    .modal{position:fixed;inset:0;background:rgba(20,20,20,.44);display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:50}
    .modal.show{display:flex}
    .modal-card{width:min(720px,100%);max-height:86vh;overflow:auto;background:var(--paper);padding:16px}
    .modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .modal-head h2{margin:0;font-size:26px;letter-spacing:-.03em}
    .time-grid{display:grid;gap:8px}
    .time-row{display:grid;grid-template-columns:1.2fr .8fr;gap:8px;align-items:center;border:3px solid var(--line);background:#fff;border-radius:16px;padding:10px;font-weight:900}
    .time-row.done{background:#eaffdf}
    .mini{font-size:12px;color:var(--muted);font-weight:850}
    .hidden{display:none!important}
    .shake{animation:shake .28s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    @media (min-width:720px){
      .wrap{padding:26px 18px 110px}
      .decks{grid-template-columns:1fr 1fr}
      .rules{grid-template-columns:1fr 1fr}
      .question-card{padding:22px}
      .options{grid-template-columns:1fr 1fr}
      .modal{align-items:center}
    }
  </style>
</head>

  ['январь', /январ[ьяею]?/g], ['февраль', /феврал[ьяею]?/g], ['март', /март[аеу]?/g],
  ['апрель', /апрел[ьяею]?/g], ['май', /\bма[йяею]\b/g], ['июнь', /июн[ьяею]?/g],
  ['июль', /июл[ьяею]?/g], ['август', /август[аеу]?/g], ['сентябрь', /сентябр[ьяею]?/g],
  ['октябрь', /октябр[ьяею]?/g], ['ноябрь', /ноябр[ьяею]?/g], ['декабрь', /декабр[ьяею]?/g]

function yearList(s){
  return (String(s || '').match(/\d{3,4}/g) || []).filter(y => Number(y) >= 800 && Number(y) <= 2100);
}
function yearsOnly(s){
  const ys = yearList(s);
  if(!ys.length) return '';
  const uniq = [...new Set(ys)];
  return uniq.length === 1 ? uniq[0] : uniq.join('-');
}
function mainYearTarget(item){
  const fromDate = yearsOnly(item.date);
  if(fromDate) return fromDate;
  const primaryYears = yearList([item.event, item.know].join(' '));
  const fallbackYears = primaryYears.length ? primaryYears : yearList(item.section || '');
  if(!fallbackYears.length) return '';
  const know = norm(item.know || '');
  if(/роспуск|окончан|заверш|конец/.test(know)) return fallbackYears[fallbackYears.length - 1];
  if(/создан|создание|открыт|учрежд|начал|год/.test(know)) return fallbackYears[0];
  return fallbackYears[0];
}
function canonicalMonthName(s){
  let t = norm(s);
  for(const [name,re] of MONTH_NAMES){
    re.lastIndex = 0;
    if(re.test(t)) return name;
  }
  return '';

function monthYearOnly(s){
  let src = String(s || '').replace(/[–—−]/g,'-').replace(/\s+/g,' ').trim();
  const years = yearList(src);
  if(!years.length) return yearsOnly(src);
  const parts = src.split(/\s*-\s*/).filter(Boolean);
  const chunks = [];
  let lastMonth = '';
  let lastYear = '';
  for(const part of parts){
    const m = canonicalMonthName(part) || lastMonth;
    const y = (yearList(part)[0] || lastYear || years[0]);
    if(m && y){
      const chunk = m + ' ' + y;
      if(!chunks.includes(chunk)) chunks.push(chunk);
      lastMonth = m; lastYear = y;
    }
  }
  if(chunks.length) return chunks.join('-');

// Добавить период по годам и сразу начать его учить.
function addPeriod(){
  const hint = document.getElementById('pHint');
  const from = parseInt(document.getElementById('pFrom').value, 10);
  const to = parseInt(document.getElementById('pTo').value, 10);
  if(!from || !to){ if(hint) hint.textContent = 'Укажи оба года, например 1462 и 1598.'; return; }
  const a = Math.min(from, to), b = Math.max(from, to);
  const deck = buildPeriodDeck(a, b);
  if(!deck.items.length){ if(hint) hint.textContent = 'В диапазоне ' + a + '–' + b + ' нет событий. Возьми шире.'; return; }
  if(!Array.isArray(state.periods)) state.periods = [];
  // Дедуп + в начало + не больше 3 последних.
  state.periods = state.periods.filter(p => !(p.from === a && p.to === b));
  state.periods.unshift({ from:a, to:b });
  if(state.periods.length > 3) state.periods = state.periods.slice(0, 3);
  saveState();
  startDeck(periodDeckId(a, b));
}

function activePool(){
  const s = deckState(currentDeck);
  if(s.phase === 'choose') return currentDeck.items.filter(e => (s.items[e.id].choose || 0) < NEED_CHOOSE);
  if(s.phase === 'type') return currentDeck.items.filter(e => !s.items[e.id].typed);
  return [];
}
function pickNext(){
  const s = deckState(currentDeck);
  let pool = activePool();
  if(!pool.length){
    const st = deckStats(currentDeck);
    if(s.phase !== st.phase) return pickNext();
    return null;
  }
  if(pool.length > 1) pool = pool.filter(e => e.id !== s.lastId);
  // prioritize lower progress and older attempts, then random
  pool = shuffle(pool).sort((a,b) => {
    const ra = s.items[a.id], rb = s.items[b.id];
    if(s.phase === 'choose') return (ra.choose||0) - (rb.choose||0) || (ra.attempts||0) - (rb.attempts||0);
    return (ra.attempts||0) - (rb.attempts||0);
  });
  const item = pool[0];
  s.lastId = item.id;
  saveState();
  return item;
}
function makeOptions(item){
  const correct = target(currentDeck, item);
  const values = [];
  currentDeck.items.forEach(e => {
    const v = target(currentDeck, e);
    if(v && v !== correct && !values.includes(v)) values.push(v);
  });
  if(values.length < 3 && currentDeck.kind === 'main'){
    EVENTS.filter(e => !e.isVov).forEach(e => {
      const v = mainYearTarget(e);
      if(v && v !== correct && !values.includes(v)) values.push(v);
    });
  }
  return shuffle([correct, ...shuffle(values).slice(0,3)]);
}

function checkChoose(){
  if(!selected || waitingAfterWrong) return;
  const correct = target(currentDeck, currentItem);
  const ok = selected === correct;
  const r = rec(currentDeck, currentItem);
  r.attempts = (r.attempts || 0) + 1;
  if(ok) r.choose = Math.min(NEED_CHOOSE, (r.choose || 0) + 1);
  else { r.choose = 0; r.wrong = (r.wrong || 0) + 1; }
  saveState();
  document.querySelectorAll('.option').forEach(btn => {
    const val = btn.dataset.value;
    btn.classList.toggle('correct', ok && val === correct);
    btn.classList.toggle('wrong', !ok && val === selected);
    btn.disabled = true;
  });
  if(ok){
    revealed = true;
    showFeedback('ok', `Верно. Серия: ${r.choose}/${NEED_CHOOSE}.`);
    autoTimer = setTimeout(nextQuestion, 430);
  }else{
    waitingAfterWrong = true;
    revealed = true;
    revealAnswer('no', 'Неверно. Правильный ответ');
    setShowButton('Дальше', 'green');
  }

function checkType(){
  const input = document.getElementById('answerInput')?.value || '';
  const correct = target(currentDeck, currentItem);
  const ok = isCorrectForDeck(input, correct, currentDeck.kind);
  const r = rec(currentDeck, currentItem);
  r.attempts = (r.attempts || 0) + 1;
  if(ok){ const wasTyped = r.typed; r.typed = true; if(!wasTyped) notifyMastered(currentDeck, currentItem); }
  else r.wrong = (r.wrong || 0) + 1;
  saveState();
  if(ok){
    revealed = true;
    const inputEl = document.getElementById('answerInput');
    if(inputEl) inputEl.disabled = true;
    showFeedback('ok', 'Верно. Ответ вылетает из пула.');

    waitingAfterWrong = true;
    revealed = true;
    const inputEl = document.getElementById('answerInput');
    if(inputEl) inputEl.disabled = true;
    revealAnswer('no', 'Неверно. Правильный ответ');
    setShowButton('Дальше', 'green');
  }

const monthNums = [
  ['01', /январ[ьяею]?/g], ['02', /феврал[ьяею]?/g], ['03', /март[аеу]?/g],
  ['04', /апрел[ьяею]?/g], ['05', /ма[йяею]/g], ['06', /июн[ьяею]?/g],
  ['07', /июл[ьяею]?/g], ['08', /август[аеу]?/g], ['09', /сентябр[ьяею]?/g],
  ['10', /октябр[ьяею]?/g], ['11', /ноябр[ьяею]?/g], ['12', /декабр[ьяею]?/g]
];
function norm(s){
  return String(s || '').toLowerCase().replace(/ё/g,'е').replace(/[–—−]/g,'-').replace(/\([^)]*\)/g,' ')
    .replace(/№/g,' ').replace(/[.,;:«»"']/g,' ').replace(/\s+/g,' ').trim();
}
function tokenize(s){
  let t = norm(s);
  monthNums.forEach(([num,re]) => { t = t.replace(re, ' ' + num + ' '); });
  t = t.replace(/(год|года|году|годы|г|век|века|период)/g,' ');
  const raw = t.match(/\d{1,4}/g) || [];
  return raw.map(x => {
    const n = parseInt(x,10);
    if(x.length === 4) return String(n).padStart(4,'0');
    return String(n).padStart(2,'0');
  });
}
function isCorrect(user, expected){
  const u = norm(user), e = norm(expected);
  if(!u) return false;
  if(u === e) return true;
  const ut = tokenize(user), et = tokenize(expected);
  if(et.length && ut.join('|') === et.join('|')) return true;
  // For text-only terms like МГУ/ВЧК: require normalized exact answer.
  return false;
}
function isCorrectCommander(user, expected){
  const u = norm(user).replace(/\b[а-я]\b/g,' ').replace(/\s+/g,' ').trim();
  const e = norm(expected);
  if(!u) return false;
  if(u === e) return true;
  const parts = e.split(' ').filter(Boolean);
  const surname = parts[parts.length - 1];
  if(u === surname) return true;
  return u.split(' ').includes(surname);
}
function decadeNumbers(s){
  const nums = [];
  (String(s || '').match(/\d{4}/g) || []).forEach(y => {
    nums.push(y);
    nums.push(y.slice(2,4).replace(/^0/, '') || '0');
  });
  return [...new Set(nums)];
}
function filmPeriodOk(user, period){
  const u = norm(user);
  const p = norm(period);
  const periodWords = [
    ['оттепел', ['оттепел']],
    ['засто', ['засто']],
    ['перестро', ['перестро']],
    ['сталин', ['сталин']],
    ['постсовет', ['постсовет', '90', '1990']],
    ['вов', ['вов', 'великая отечественная', '1941', '1945', '40']],
    ['брежнев', ['брежнев', 'засто']],
    ['пятилет', ['пятилет', '1930', '30']],
    ['культурн', ['культурн', '1930', '30']],
    ['половин', ['половин', 'половина']]
  ];
  for(const [key, variants] of periodWords){
    if(p.includes(key) && variants.some(v => u.includes(v))) return true;
  }
  const nums = decadeNumbers(period);
  if(nums.length){
    return nums.some(n => new RegExp('(^|\\D)' + n + '(\\D|$)').test(u));
  }
  return p && u.includes(p);
}
function filmAuthorOk(user, author){
  const u = norm(user);
  const a = norm(author);
  if(!a || a.includes('не указан')) return true;
  if(u.includes(a)) return true;
  const segments = a.split(/\s+\/\s+|\s+и\s+/).map(x => x.trim()).filter(Boolean);
  const surnames = [];
  segments.forEach(seg => {
    const words = seg.split(' ').filter(w => !['братья','режиссер','режиссёр'].includes(w));
    if(words.length) surnames.push(words[words.length - 1]);
  });
  return surnames.some(s => s && u.split(' ').includes(s));
}
function isCorrectFilm(user, expected){
  const parts = String(expected || '').split(' · ');
  const period = parts[0] || '';
  const author = parts.slice(1).join(' · ') || '';
  return filmPeriodOk(user, period) && filmAuthorOk(user, author);
}
function isCorrectForDeck(user, expected, kind){
  if(kind === 'commander') return isCorrectCommander(user, expected);
  if(kind === 'film') return isCorrectFilm(user, expected);
  return isCorrect(user, expected);
}
// ── Интеграция с основным приложением (когда открыто в iframe) ──
const EMBEDDED = (function(){ try { return window.parent && window.parent !== window; } catch(e){ return false; } })();

// Факт полностью освоен (фаза ввода пройдена) → сообщаем приложению для зачёта в «выучено»/SRS.
function notifyMastered(deck, item){
  if(!EMBEDDED) return;
  try {
    if(typeof window.parent.cramMastered !== 'function') return;
    const ans = target(deck, item);
    // Ключ по id факта — дедуп одного факта между колодами (например событие в блоке и в ВОВ).
    window.parent.cramMastered({ key: String(item.id), label: String(item.event || '') + ' → ' + String(ans || '') });
  } catch(e){}
}

// Кнопка выхода: в iframe закрываем оверлей приложения, иначе обычный возврат.
(function(){
  const exitBtn = document.getElementById('cramExit');
  if(!exitBtn) return;
  function exitCram(){
    if(EMBEDDED){
      // 1) штатный путь — функция приложения
      try { if(typeof window.parent.closeCram === 'function'){ window.parent.closeCram(); return; } } catch(e){}
      // 2) запасной путь — напрямую прячем оверлей в родителе (на случай устаревшего ui.js)
      try {
        var ov = window.parent.document.getElementById('cram-overlay');
        if(ov){ ov.classList.add('hidden'); ov.style.display = 'none'; window.parent.document.body.classList.remove('cram-open'); return; }
      } catch(e){}
      // 3) сообщение родителю (если прямой доступ к DOM закрыт)
      try { window.parent.postMessage({ type: 'cram-exit' }, '*'); return; } catch(e){}
    }
    if(history.length > 1) history.back();
  }
  exitBtn.addEventListener('click', exitCram);
  exitBtn.addEventListener('touchend', function(e){ e.preventDefault(); exitCram(); }, { passive: false });
})();

// Диплинк: cram.html#deck=<id> открывает конкретную колоду (для ДЗ).
(function(){
  const m = (location.hash || '').match(/deck=([^&]+)/);
  if(m){
    const id = decodeURIComponent(m[1]);
    if(getDecks().find(d => d.id === id)){ startDeck(id); return; }
  }
  renderHome();
})();
</script>
